{% set version = "7.1.2-25" %}
{% set build = 3 %}
{% if license_family == "agpl" %}
    {% set build = build + 100 %}
{% endif %}

package:
  name: imagemagick
  version: {{ version|replace("-", "_") }}

source:
  url: https://github.com/ImageMagick/ImageMagick/archive/{{ version }}.tar.gz
  sha256: ff33d227d2e1744327280e956ec9f7abaebbd8f48277d16cdad906e05e4794b6
  patches:
    - skip-additional-fd-tests-on-windows.patch  # [win]

build:
  number: {{ build }}
  string: {{ license_family }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
  ignore_run_exports_from:
    # expat is only needed for pkg-config dependency resolution of fontconfig.
    # ImageMagick does not use expat directly at runtime.
    - expat

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - autotools_clang_conda  # [win]
    - gnuconfig              # [unix]
    - make                   # [unix] 
    - pkg-config
  host:
    - bzip2
    - expat
    - fftw
    - fontconfig
    - fonts-conda-forge
    - freetype
    - ghostscript            # [license_family == "agpl"]
    - giflib
    - glib
    - graphviz
    - jbig
    - lcms2
    - libheif
    - libjpeg-turbo
    - libjxl
    - liblzma-devel
    - libpng
    - libraw
    - librsvg
    - libtiff
    - libultrahdr
    - libwebp
    - libxml2-devel
    - libzip
    - openexr
    - openjpeg
    - pango
    - xorg-libx11            # [unix]
    - xorg-libxext           # [unix]
    - xorg-libxrender        # [unix]
    - xorg-libxt             # [unix]
    - zlib
  run:
    - fonts-conda-forge
    - ghostscript
    - jbig                   # [win]

test:
  commands:
    - magick --version
    
    # NOTE: On Windows, gslib appears in Delegates even without ghostscript in host deps,
    # likely due to ImageMagick's automatic Ghostscript detection via Windows registry or nt-base.c hardcoding. 
    # Cannot reliably test gslib absence on Windows.
    - magick --version | grep -q gslib && exit 1 || exit 0  # [unix and license_family != "agpl"]
    
    - magick -size 10x10 xc:white white.png
    - magick -size 10x10 xc:white white.jpg
    - magick -size 10x10 xc:white white.tiff
    - magick white.png white.jpg
    - Magick++-config --cflags                            # [unix]
    - if not exist %LIBRARY_BIN%\MagickCore-*.dll exit 1  # [win]
    - if not exist %LIBRARY_BIN%\MagickWand-*.dll exit 1  # [win]

about:
  home: http://www.imagemagick.org/
  license_file: LICENSE
  license: AGPL-3.0-only AND ImageMagick  # [license_family == "agpl"]
  license_family: AGPL                    # [license_family == "agpl"]
  license: ImageMagick                    # [license_family == "imagemagick"]
  license_family: Apache                  # [license_family == "imagemagick"]
  summary: Software suite to create, edit, compose, or convert bitmap images.

extra:
  recipe-maintainers:
    - ocefpaf
    - halldc
