{% set version = "7.1.2-24" %}
{% set build = 1 %}
{% if license_family == "agpl" %}
    {% set build = build + 100 %}
{% endif %}

package:
  name: imagemagick
  version: {{ version|replace("-", "_") }}

source:
  url: https://github.com/ImageMagick/ImageMagick/archive/{{ version }}.tar.gz
  sha256: 645f1dc68482ba952a02a854ffaf67efca42871b168e0cf702a043db2ec54638

build:
  number: {{ build }}
  string: {{ license_family }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - autotools_clang_conda  # [win]
    - gnuconfig              # [unix]
    - make                   # [unix] 
    - pkg-config
  host:
    - bzip2
    - expat
    - fftw
    - fontconfig
    - fonts-conda-forge
    - freetype
    - ghostscript            # [license_family=="agpl"]
    - giflib
    - glib
    - graphviz
    - jbig
    - lcms2
    - libheif
    - libjpeg-turbo
    - libjxl
    - liblzma-devel
    - libpng
    - librsvg
    - libtiff
    - libwebp
    - libxml2-devel
    - libzip
    - openjpeg
    - pango
    - xorg-libx11            # [unix]
    - xorg-libxext           # [unix]
    - xorg-libxrender        # [unix]
    - xorg-libxt             # [unix]
    - zlib
  run:
    - fonts-conda-forge
    - ghostscript            # [license_family=="agpl"]
    - jbig                   # [win]

test:
  commands:
    - magick --version
    - magick --version | grep -q gslib && exit 1 || exit 0  # [unix]
    - Magick++-config --cflags                              # [unix]

    # Verify basic image operations work
    - magick -size 10x10 xc:white white.png
    - magick -size 10x10 xc:white white.jpg
    - magick -size 10x10 xc:white white.tiff
    - magick white.png white.jpg

    # Windows: verify DLLs exist
    - if not exist %LIBRARY_BIN%\MagickCore-*.dll exit 1    # [win]
    - if not exist %LIBRARY_BIN%\MagickWand-*.dll exit 1    # [win]


about:
  home: http://www.imagemagick.org/
  license_file: LICENSE
  license: AGPL  # [license_family=="agpl"]
  license_family: AGPL  # [license_family=="agpl"]
  license: ImageMagick  # [license_family=="imagemagick"]
  license_family: Apache  # [license_family=="imagemagick"]
  summary: Software suite to create, edit, compose, or convert bitmap images.

extra:
  recipe-maintainers:
    - ocefpaf
    - halldc
